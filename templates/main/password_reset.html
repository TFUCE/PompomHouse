{% extends 'base.html' %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="auth-shell card">
  <h1>Reset {{ role_label|lower }} password</h1>
  <p class="muted">Enter your email and set a new password.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div class="form-row">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <div class="button-row">
      <button type="submit">Update password</button>
      <a class="button secondary" href="{% url 'login-role' role %}">Back to login</a>
    </div>
  </form>
</div>
{% endblock %}
