{% extends 'base.html' %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="auth-shell card">
  <h1>{{ page_title }}</h1>
  {% if page_intro %}<p class="muted">{{ page_intro }}</p>{% endif %}
  <div class="grid grid-2">
    <section class="card">
      <h2>{{ left_title }}</h2>
      <p class="muted">{{ left_text }}</p>
      <a class="button" href="{% if left_url_arg %}{% url left_url left_url_arg %}{% else %}{% url left_url %}{% endif %}">{{ left_button }}</a>
    </section>
    <section class="card">
      <h2>{{ right_title }}</h2>
      <p class="muted">{{ right_text }}</p>
      <a class="button" href="{% if right_url_arg %}{% url right_url right_url_arg %}{% else %}{% url right_url %}{% endif %}">{{ right_button }}</a>
    </section>
  </div>
</div>
{% endblock %}
